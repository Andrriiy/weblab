version: "3.9"

services:
  backend:
    build:
      context: ./artifacts/java-backend
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      PORT: 8081
    restart: unless-stopped

  frontend:
    build:
      context: ./artifacts/frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
